# ============================================
# AI Orchestrator v2.1 — Hermes Brain + Orchestrator Hands
# Chay: docker compose up -d
# Port range: 5000-5009
#
# Gateway (entry):      http://localhost:5005 → ai.remoteterminal.online
# Hermes (Brain):       http://localhost:5000
# Hermes WebUI:         http://localhost:5001
# LiteLLM Gateway:      http://localhost:5002
# Orchestrator API:     http://localhost:5003
# Analytics + Dashboard: http://localhost:5004
# ============================================

services:
  # === LiteLLM Proxy — API Gateway (tat ca model di qua day) ===
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: orcai-litellm
    ports:
      - "${LITELLM_PORT:-5002}:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - litellm_data:/app/data
    env_file:
      - .env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - UI_USERNAME=admin
      - UI_PASSWORD=admin
      - STORE_MODEL_IN_DB=False
    command: >
      --config /app/config.yaml
      --port 4000
      --num_workers 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Hermes Agent — BRAIN: memory, vector DB, auto-learn, self-improve ===
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: orcai-hermes
    ports:
      - "${HERMES_PORT:-5000}:3000"
    volumes:
      - hermes_data:/root/.hermes
      - ./hermes_config.yaml:/root/.hermes/config.yaml
      - ./skills:/root/.hermes/skills
      # Mount projects de Hermes doc/ghi code
      - /e/DEVELOP/FashionEcom:/projects/FashionEcom
      - /e/DEVELOP/VietNet2026:/projects/VietNet2026
      - /e/DEVELOP/LeQuyDon:/projects/LeQuyDon
      - /e/DEVELOP/WebPhoto:/projects/WebPhoto
      - /e/DEVELOP/RemoteTerminal:/projects/RemoteTerminal
      - /e/DEVELOP/ai-orchestrator:/projects/ai-orchestrator
    env_file:
      - .env
    environment:
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - ORCHESTRATOR_URL=http://orchestrator:5003
      - GATEWAY_ALLOW_ALL_USERS=true
    depends_on:
      - litellm
    restart: unless-stopped
    command: ["dashboard", "--host", "0.0.0.0", "--port", "3000", "--insecure"]

  # === Hermes WebUI — Mobile-friendly dashboard ===
  # NOTE: nesquena/hermes-webui can hermes-agent installed cung version
  # Dung Open WebUI thay the neu hermes-webui khong tuong thich
  hermes-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: orcai-webui
    ports:
      - "${WEBUI_PORT:-5001}:8080"
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      - litellm
    restart: unless-stopped

  # === Orchestrator API — HANDS: scan, plan, route, execute ===
  orchestrator:
    image: node:22-alpine
    container_name: orcai-orchestrator
    working_dir: /app
    ports:
      - "${ORCHESTRATOR_PORT:-5003}:5003"
    volumes:
      - ./:/app
      - /e/DEVELOP/FashionEcom:/projects/FashionEcom
      - /e/DEVELOP/VietNet2026:/projects/VietNet2026
      - /e/DEVELOP/LeQuyDon:/projects/LeQuyDon
      - /e/DEVELOP/WebPhoto:/projects/WebPhoto
      - /e/DEVELOP/RemoteTerminal:/projects/RemoteTerminal
    command: ["node", "src/api-server.js"]
    environment:
      - PORT=5003
      - LITELLM_URL=http://litellm:4000
      - LITELLM_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - DAILY_BUDGET=2.00
    depends_on:
      - litellm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === Analytics + Dashboard — Cost tracking + monitoring ===
  analytics:
    image: node:22-alpine
    container_name: orcai-analytics
    working_dir: /app
    ports:
      - "${ANALYTICS_PORT:-5004}:5004"
    volumes:
      - ./analytics:/app/analytics:ro
      - ./data:/app/data
    command: ["node", "analytics/api-server.js"]
    environment:
      - ANALYTICS_PORT=5004
      - LITELLM_URL=http://litellm:4000
      - LITELLM_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
    depends_on:
      - litellm
    restart: unless-stopped

  # === Gateway — Nginx reverse proxy + Login UI ===
  gateway:
    image: nginx:alpine
    container_name: orcai-gateway
    ports:
      - "${GATEWAY_PORT:-5005}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/login.html:/usr/share/nginx/html/login.html:ro
      - ./gateway/portal.html:/usr/share/nginx/html/portal.html:ro
    depends_on:
      - auth
      - litellm
      - orchestrator
      - analytics
    restart: unless-stopped

  # === Auth Service — Login/logout/verify cho gateway ===
  auth:
    image: node:22-alpine
    container_name: orcai-auth
    working_dir: /app
    volumes:
      - ./gateway:/app
    command: ["sh", "-c", "cd /app && npm install --silent 2>/dev/null && node auth-server.js"]
    environment:
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
      - JWT_SECRET=${JWT_SECRET:-orcai-dev-secret-change-me}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - NODE_ENV=${NODE_ENV:-development}
    restart: unless-stopped

  # === Cloudflare Tunnel — Expose gateway ra internet ===
  # Chi chay khi co CLOUDFLARE_TUNNEL_TOKEN trong .env
  # Setup: scripts/tunnel-setup.bat
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: orcai-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - gateway
    restart: unless-stopped
    profiles:
      - tunnel

  # === Trust Graph Watcher — Auto re-index khi file thay doi ===
  trust-graph:
    image: node:22-alpine
    container_name: orcai-trustgraph
    working_dir: /app
    volumes:
      - ./graph:/app/graph:ro
      - ./data:/app/data
      - /e/DEVELOP/FashionEcom:/projects/FashionEcom:ro
      - /e/DEVELOP/VietNet2026:/projects/VietNet2026:ro
      - /e/DEVELOP/LeQuyDon:/projects/LeQuyDon:ro
      - /e/DEVELOP/WebPhoto:/projects/WebPhoto:ro
      - /e/DEVELOP/RemoteTerminal:/projects/RemoteTerminal:ro
    command: ["node", "graph/watcher-docker.js"]
    restart: unless-stopped

volumes:
  litellm_data:
    driver: local
  hermes_data:
    driver: local
  webui_data:
    driver: local
