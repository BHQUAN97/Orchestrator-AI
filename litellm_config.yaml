# ============================================
# LiteLLM Proxy Config — Multi-Model Gateway
# Co: Gemini key + OpenRouter key (200+ models)
# Updated: 2026-04-16 — Upgrade model lineup v2
# ============================================

model_list:
  # ★ default: DeepSeek V3.2 qua OpenRouter (thay Kimi K2.5)
  - model_name: "default"
    litellm_params:
      model: "openai/deepseek/deepseek-v3.2"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # ★★ architect: Claude Opus 4.6 — SA, kien truc, task cuc kho
  - model_name: "architect"
    litellm_params:
      model: "openai/anthropic/claude-opus-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 10

  # smart: Claude Sonnet 4.6 qua OpenRouter (upgrade tu Sonnet 4)
  - model_name: "smart"
    litellm_params:
      model: "openai/anthropic/claude-sonnet-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  # fast: Gemini 3 Flash Preview truc tiep (pin primary, khong duplicate)
  # Neu het quota Google, dung model "fast-or" de di OpenRouter
  - model_name: "fast"
    litellm_params:
      model: "gemini/gemini-3-flash-preview"
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 60

  # fast-or: Gemini 3 Flash qua OpenRouter (khi Google quota het)
  - model_name: "fast-or"
    litellm_params:
      model: "openai/google/gemini-3-flash-preview"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # cheap: GPT-5.4 Mini qua OpenRouter (thay DeepSeek Chat)
  - model_name: "cheap"
    litellm_params:
      model: "openai/openai/gpt-5.4-mini"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # --- Goi truc tiep tung model ---
  - model_name: "deepseek"
    litellm_params:
      model: "openai/deepseek/deepseek-v3.2"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  - model_name: "gemini"
    litellm_params:
      model: "gemini/gemini-3-flash-preview"
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 60

  - model_name: "opus"
    litellm_params:
      model: "openai/anthropic/claude-opus-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 10

  - model_name: "sonnet"
    litellm_params:
      model: "openai/anthropic/claude-sonnet-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  - model_name: "gpt-mini"
    litellm_params:
      model: "openai/openai/gpt-5.4-mini"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # Legacy — giu lai de fallback
  - model_name: "kimi"
    litellm_params:
      model: "openai/moonshotai/kimi-k2.5"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # === FREE TIER models qua OpenRouter (:free suffix) ===
  # Danh sach verify tu /v1/models endpoint 2026-04-18
  # Rate limit: ~20 req/min per model free tier

  # MiniMax M2.5 — refactor, long context (196K)
  - model_name: "free-minimax"
    litellm_params:
      model: "openai/minimax/minimax-m2.5:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  # Qwen3 Coder — coder-optimized, 262K ctx
  - model_name: "free-qwen"
    litellm_params:
      model: "openai/qwen/qwen3-coder:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  # GPT OSS 120B — big OSS model, 131K ctx (prefix openrouter to disambig)
  - model_name: "free-gpt-oss"
    litellm_params:
      model: "openrouter/openai/gpt-oss-120b:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  # Llama 3.3 70B — general purpose, 65K ctx
  - model_name: "free-llama"
    litellm_params:
      model: "openai/meta-llama/llama-3.3-70b-instruct:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  # GLM 4.5 Air — balance speed/quality, 131K ctx
  - model_name: "free-glm"
    litellm_params:
      model: "openai/z-ai/glm-4.5-air:free"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  # === LOCAL MODELS (LM Studio @ localhost:1234) ===
  # Hybrid strategy: local SUPPLEMENTS cloud, khong replace.
  # Khi chay ngoai Docker: override api_base bang env LMSTUDIO_URL (vd http://localhost:1234/v1)
  # Trong Docker: dung host.docker.internal de reach LM Studio chay tren host

  # local-classifier: 1.5B — phan loai intent nhanh, tiet kiem cloud calls
  - model_name: "local-classifier"
    litellm_params:
      model: "openai/qwen2.5-coder-1.5b-instruct"
      api_base: "os.environ/LMSTUDIO_URL"  # fallback: http://host.docker.internal:1234/v1
      api_key: "lm-studio"
      rpm: 120

  # local-workhorse: 3B — task trivial, docs, rename
  - model_name: "local-workhorse"
    litellm_params:
      model: "openai/qwen2.5-coder-3b-instruct"
      api_base: "os.environ/LMSTUDIO_URL"
      api_key: "lm-studio"
      rpm: 60

  # local-heavy: 7B — privacy-sensitive code, offline fallback
  - model_name: "local-heavy"
    litellm_params:
      model: "openai/qwen2.5-coder-7b-instruct"
      api_base: "os.environ/LMSTUDIO_URL"
      api_key: "lm-studio"
      rpm: 30

  # local-embed: nomic embeddings — free local alternative cho OpenAI text-embedding-3-small
  - model_name: "local-embed"
    litellm_params:
      model: "openai/text-embedding-nomic-embed-text-v1.5@q4_k_m"
      api_base: "os.environ/LMSTUDIO_URL"
      api_key: "lm-studio"
      rpm: 120

# Router
router_settings:
  routing_strategy: "usage-based-routing-v2"
  enable_pre_call_checks: true
  allowed_fails: 3
  cooldown_time: 60
  num_retries: 2
  retry_after: 5

# Budget — gioi han $2/ngay (user requirement)
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  max_budget: 2.0
  budget_duration: "1d"

# Cache
litellm_settings:
  cache: true
  cache_params:
    type: "local"
    ttl: 300
  success_callback: ["db"]
  failure_callback: ["db"]
