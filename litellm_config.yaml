# ============================================
# LiteLLM Proxy Config — Multi-Model Gateway
# Co: Gemini key + OpenRouter key (200+ models)
# Updated: 2026-04-16 — Upgrade model lineup v2
# ============================================

model_list:
  # ★ default: DeepSeek V3.2 qua OpenRouter (thay Kimi K2.5)
  - model_name: "default"
    litellm_params:
      model: "openai/deepseek/deepseek-v3.2"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # ★★ architect: Claude Opus 4.6 — SA, kien truc, task cuc kho
  - model_name: "architect"
    litellm_params:
      model: "openai/anthropic/claude-opus-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 10

  # smart: Claude Sonnet 4.6 qua OpenRouter (upgrade tu Sonnet 4)
  - model_name: "smart"
    litellm_params:
      model: "openai/anthropic/claude-sonnet-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  # fast: Gemini 3 Flash Preview truc tiep (upgrade tu 2.5 Flash)
  - model_name: "fast"
    litellm_params:
      model: "gemini/gemini-3-flash-preview"
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 60

  # fast fallback: Gemini 3 Flash qua OpenRouter
  - model_name: "fast"
    litellm_params:
      model: "openai/google/gemini-3-flash-preview"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # cheap: GPT-5.4 Mini qua OpenRouter (thay DeepSeek Chat)
  - model_name: "cheap"
    litellm_params:
      model: "openai/openai/gpt-5.4-mini"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # --- Goi truc tiep tung model ---
  - model_name: "deepseek"
    litellm_params:
      model: "openai/deepseek/deepseek-v3.2"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  - model_name: "gemini"
    litellm_params:
      model: "gemini/gemini-3-flash-preview"
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 60

  - model_name: "opus"
    litellm_params:
      model: "openai/anthropic/claude-opus-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 10

  - model_name: "sonnet"
    litellm_params:
      model: "openai/anthropic/claude-sonnet-4-6"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20

  - model_name: "gpt-mini"
    litellm_params:
      model: "openai/openai/gpt-5.4-mini"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

  # Legacy — giu lai de fallback
  - model_name: "kimi"
    litellm_params:
      model: "openai/moonshotai/kimi-k2.5"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 30

# Router
router_settings:
  routing_strategy: "usage-based-routing-v2"
  enable_pre_call_checks: true
  allowed_fails: 3
  cooldown_time: 60
  num_retries: 2
  retry_after: 5

# Budget — gioi han $2/ngay (user requirement)
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  max_budget: 2.0
  budget_duration: "1d"

# Cache
litellm_settings:
  cache: true
  cache_params:
    type: "local"
    ttl: 300
  success_callback: ["db"]
  failure_callback: ["db"]
