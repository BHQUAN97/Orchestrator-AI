# Router
router_settings:
  routing_strategy: "usage-based-routing-v2"
  enable_pre_call_checks: true
  allowed_fails: 2
  cooldown_time: 300
  num_retries: 1
  retry_after: 2
  # Auto-fallback khi het rate limit / quota — KHONG hoi lai user
  # smart/fast: Gemini het → OpenRouter Gemini → cheap (GPT-5.4 Mini)
  # default: DeepSeek het → cheap
  fallbacks:
    - smart: ["fast-or", "cheap"]
    - fast: ["fast-or", "cheap"]
    - default: ["cheap"]
    - gemini: ["fast-or", "cheap"]

# Budget — gioi han $2/ngay (user requirement)
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  max_budget: 2.0
  budget_duration: "1d"

# Cache
litellm_settings:
  cache: true
  cache_params:
    type: "local"
    ttl: 1800          # 30 phut — khop voi warm-context window
  success_callback: ["db"]
  failure_callback: ["db"]
