worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Trust Cloudflare proxy headers
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream definitions — dung ten service trong docker-compose
    upstream auth_backend {
        server auth:3100;
    }
    upstream hermes_backend {
        server hermes:3000;
    }
    upstream webui_backend {
        server hermes-webui:8080;
    }
    upstream litellm_backend {
        server litellm:4000;
    }
    upstream orchestrator_backend {
        server orchestrator:5003;
    }
    upstream analytics_backend {
        server analytics:5004;
    }

    server {
        listen 80;
        server_name _;

        # === Security headers ===
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # === Login page (khong can auth) ===
        location = / {
            # Neu da login → redirect to portal
            auth_request /internal/auth-check;
            error_page 401 = @show_login;
            return 302 /portal;
        }

        location @show_login {
            root /usr/share/nginx/html;
            try_files /login.html =404;
        }

        location = /login {
            root /usr/share/nginx/html;
            try_files /login.html =404;
        }

        # === Auth endpoints (khong can auth) ===
        location /auth/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # === Internal auth check cho nginx auth_request ===
        location = /internal/auth-check {
            internal;
            proxy_pass http://auth_backend/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
        }

        # === Portal dashboard (can auth) ===
        location = /portal {
            auth_request /internal/auth-check;
            error_page 401 = /login;
            root /usr/share/nginx/html;
            try_files /portal.html =404;
        }

        # === Health check (khong can auth) ===
        location = /health {
            proxy_pass http://orchestrator_backend/health;
        }

        # =============================================
        # PROTECTED ROUTES — tat ca can auth
        # =============================================

        # --- Orchestrator API ---
        location /api/ {
            auth_request /internal/auth-check;
            error_page 401 = @api_unauthorized;
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://orchestrator_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location @api_unauthorized {
            default_type application/json;
            return 401 '{"error":"Unauthorized","login":"/login"}';
        }

        # --- LiteLLM Gateway ---
        location /litellm/ {
            auth_request /internal/auth-check;
            error_page 401 = @api_unauthorized;

            rewrite ^/litellm/(.*) /$1 break;
            proxy_pass http://litellm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # LiteLLM can master key — tu dong inject
            proxy_set_header Authorization "Bearer sk-master-change-me";
        }

        # --- Analytics Dashboard ---
        location /analytics/ {
            auth_request /internal/auth-check;
            error_page 401 = /login;

            rewrite ^/analytics/(.*) /$1 break;
            proxy_pass http://analytics_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Alias /analytics khong co trailing slash
        location = /analytics {
            return 302 /analytics/;
        }

        # --- Hermes Brain ---
        location /hermes/ {
            auth_request /internal/auth-check;
            error_page 401 = /login;

            rewrite ^/hermes/(.*) /$1 break;
            proxy_pass http://hermes_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location = /hermes {
            return 302 /hermes/;
        }

        # --- Open WebUI ---
        location /webui/ {
            auth_request /internal/auth-check;
            error_page 401 = /login;

            rewrite ^/webui/(.*) /$1 break;
            proxy_pass http://webui_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location = /webui {
            return 302 /webui/;
        }

        # === Static assets cho login/portal ===
        location /assets/ {
            root /usr/share/nginx/html;
        }
    }
}
