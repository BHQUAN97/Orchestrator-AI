<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrcAI — Login</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #242836;
    --border: #2a2e3b;
    --primary: #6c5ce7;
    --primary-hover: #7c6ef7;
    --danger: #e74c3c;
    --text: #e4e6eb;
    --text-muted: #8b8fa3;
    --text-dim: #5a5f73;
    --success: #2ecc71;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo h1 span { color: var(--primary); }
  .logo p {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 6px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: var(--primary);
  }
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .btn:hover { background: var(--primary-hover); }
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .error {
    color: var(--danger);
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    min-height: 18px;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Loading spinner */
  .btn.loading { position: relative; color: transparent; }
  .btn.loading::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 18px; height: 18px;
    margin: -9px 0 0 -9px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  @media (max-width: 480px) {
    .container { padding: 16px; }
    .card { padding: 24px 18px; }
    .logo h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1><span>Orc</span>AI</h1>
    <p>Multi-Model AI Orchestrator</p>
  </div>
  <div class="card">
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
      <div class="error" id="error"></div>
    </form>
  </div>
  <div class="footer">AI Orchestrator v2.1 &mdash; Hermes Brain + Orchestrator Hands</div>
</div>

<script>
const form = document.getElementById('loginForm');
const btn = document.getElementById('submitBtn');
const errorEl = document.getElementById('error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.textContent = '';
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    const data = await res.json();
    if (res.ok) {
      window.location.href = '/portal';
    } else {
      errorEl.textContent = data.error || 'Login failed';
    }
  } catch (err) {
    errorEl.textContent = 'Connection error';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
});
</script>
</body>
</html>
