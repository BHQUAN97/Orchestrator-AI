# ============================================
# Hermes Agent Config (v2.2 — 2026-04-18)
# Updated: Chuyen sang DeepSeek V4 (Flash/Pro) qua LiteLLM
# ============================================

# Primary: goi qua LiteLLM proxy (port 5002 internal 4000)
provider: custom
model: default # Trỏ đến DeepSeek V4 Flash trong litellm_config.yaml
api_base: http://litellm:4000/v1

# Fallback: Gemini & DeepSeek V4 Flash (OpenRouter)
fallback_providers:
  - provider: gemini
    model: gemini-3-flash-preview
  - provider: openrouter
    model: deepseek/deepseek-v4-flash

# Orchestrator API — Hermes goi day de execute tasks
orchestrator:
  url: http://orchestrator:5003
  endpoints:
    run: /api/run
    scan: /api/scan
    plan: /api/plan
    execute: /api/execute
    budget: /api/budget
    route: /api/route

# Memory — diem manh cua Hermes
memory:
  enabled: true
  backend: sqlite
  search: fts5
  auto_summarize: true
  # Vector DB cho long-term memory
  vector_store:
    enabled: true
    auto_update: true
    auto_prune: true

# Context optimization
context:
  max_tokens: 1000000
  cache_system_prompt: true
  cache_tools: true
  compression:
    enabled: true
    strategy: summarize
    threshold: 50000

# Terminal
terminal:
  backend: local
  shell: bash
  timeout: 120

# Web dashboard
dashboard:
  enabled: true
  port: 3000
  auth: false

# Security
security:
  tirith:
    enabled: true
    block_dangerous_commands: true
    allowed_paths:
      - /projects/

# Skills — auto-learn tu conversations
skills:
  auto_learn: true
  directory: /root/.hermes/skills/

# Logging
logging:
  level: info
  file: /root/.hermes/logs/hermes.log
